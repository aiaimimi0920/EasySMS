server:
  host: 0.0.0.0
  port: 8080
  # 建议启用 Bearer Token，供其他程序通过 Authorization: Bearer <token> 访问
  # apiKey: "replace-with-bearer-token"

strategy:
  strictProviderMode: false
  providerStrategyModeId: aggregate-latest

maintenance:
  enabled: true
  intervalMs: 30000
  keepRecentCount: 100
  activeProbeEnabled: true
  activeProbeIntervalMs: 300000

persistence:
  enabled: true
  driver: file
  intervalMs: 60000
  filePath: state/easy-sms-state.json

scraping:
  requestTimeoutMs: 15000
  # Provider-specific defaults override requestTimeoutMs when a source needs a
  # slower HTTP/login path. Values are milliseconds and can be forced per
  # provider from config without changing callers.
  providerRequestTimeoutMs:
    onlinesim: 15000
    smstome: 75000
    receive_smss: 30000
    receive_sms_free_cc: 30000
    sms24: 20000
    yunduanxin: 20000
    hero_sms: 15000
  maxNumbersPerProvider: 20
  userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"

providers:
  enabledProviders:
    - onlinesim
    - smstome
    - receive_smss
    - receive_sms_free_cc
    - sms24
    - yunduanxin
  onlineSim:
    # Canonical service/base auth path for onlinesim.
    apiKey: ""
  smsToMe:
    email: ""
    password: ""
  receiveSmss:
    username: ""
    password: ""
  receiveSmsFreeCc:
    email: ""
    password: ""
  synthetic:
    # Free public-inbox leases are only local reservations; expire them so the
    # small public pools are not drained forever by abandoned sessions.
    leaseWindowSeconds: 1200
    terminalOutcomeCooldownSeconds: 7200
  heroSms:
    enabled: false
    # apiKey: "replace-with-herosms-api-key"
    baseUrl: "https://hero-sms.com/stubs/handler_api.php"
    defaultService: "dr"
    defaultCountry: 16
    selectionMode: "balanced"
    reuseEnabled: true
    defaultMaxBindingsPerPhone: 1
    refundableCancelWindowSeconds: 120
    leaseWindowSeconds: 1200
